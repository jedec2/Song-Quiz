<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davis and Arnob's Spectacular Game</title>
<link rel="stylesheet" href="multistyle.css">
<script src="multiplayerscript.js" defer></script>
</head>
<body>
<div id="game">
  <div id="name-setup">
    <div class="name-row">
      <div>
        <label>Player 1 name</label>
        <input class="p1-inp" id="name-p1" type="text" value="Blue" maxlength="16" />
      </div>
      <div>
        <label>Player 2 name</label>
        <input class="p2-inp" id="name-p2" type="text" value="Pink" maxlength="16" />
      </div>
    </div>
    <div id="win-row">
      <label>First to</label>
      <input id="win-target" type="number" min="1" max="20" value="5" />
      <label>points wins</label>
    </div>
    <button id="start-game-btn">Start game →</button>
  </div>

  <div id="main-game" style="display:none">
    <div id="stage">
      <div id="prompt-label">Name a song that contains this word</div>
      <div id="word-display">—</div>
      <div id="cat-tag">buzz in to start</div>
      <div id="win-progress"></div>
    </div>

    <div class="players">
      <div class="pcard" id="card-p1">
        <div class="score-area">
          <div class="score-num" id="score-p1">0</div>
          <div class="score-pips" id="pips-p1"></div>
        </div>
        <div class="plabel">Player 1</div>
        <div class="pname" id="label-p1">Blue</div>
        <button class="buzz-btn p1" id="buzz-p1">⚡ Buzz — Q</button>
        <div class="key-hint">press Q</div>
      </div>
      <div class="pcard" id="card-p2">
        <div class="score-area">
          <div class="score-num" id="score-p2">0</div>
          <div class="score-pips" id="pips-p2"></div>
        </div>
        <div class="plabel">Player 2</div>
        <div class="pname" id="label-p2">Pink</div>
        <button class="buzz-btn p2" id="buzz-p2">⚡ Buzz — P</button>
        <div class="key-hint">press P</div>
      </div>
    </div>

    <div id="input-zone">
      <div id="active-banner">Player 1 — type a song title</div>
      <input id="song-input" type="text" placeholder="Type a song title..." autocomplete="off" />
      <div id="timer-wrap"><div id="timer-bar"></div></div>
      <button id="submit-btn" disabled>Submit</button>
    </div>

    <div id="result-zone">
      <div id="result-title">—</div>
      <div id="result-detail">—</div>
    </div>

    <div id="status-msg"></div>
    <button id="next-btn">Next word →</button>
  </div>

  <div id="win-screen">
  <div id="win-crown" class="p1c">★</div>
  <div id="win-name">Blue wins!</div>
  <div id="win-sub">First to reach the target — well played</div>
  <button id="play-again-btn">Play again</button>
  <div style="margin-top:12px">
    <a href="index.html" style="color:#8a8894;text-decoration:none">← Exit to Main Menu</a>
  </div>
</div>
</body>
</html>
